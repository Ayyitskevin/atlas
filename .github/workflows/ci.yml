name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_USER: atlas
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
      REDIS_URL: redis://localhost:6379
      S3_ACCESS_KEY_ID: atlas
      S3_BUCKET: atlas-local
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: atlas-password

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atlas/db exec prisma generate --schema prisma/schema.prisma
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:unit
      - run: docker compose up --wait -d minio
      - run: docker compose run --rm minio-init
      - run: pnpm test:integration
      - run: pnpm --filter @atlas/db exec prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script
      - if: always()
        run: docker compose down -v --remove-orphans

  docker-smoke:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build api migrate
      - run: docker compose up --wait -d postgres redis minio
      - run: docker compose run --rm minio-init
      - run: docker compose run --rm migrate
      - run: docker compose up --no-deps -d api
      - run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:4000/healthz; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs api postgres redis minio
          exit 1
      - run: docker compose exec -T -e ATLAS_E2E_DOCKER=1 -e ATLAS_E2E_BASE_URL=http://localhost:4000 api corepack pnpm --filter @atlas/api test:e2e
      - if: always()
        run: docker compose down -v --remove-orphans
