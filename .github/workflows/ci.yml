name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_USER: atlas
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @atlas/db exec prisma generate --schema prisma/schema.prisma
      - run: corepack pnpm lint
      - run: corepack pnpm typecheck
      - run: corepack pnpm test
      - run: corepack pnpm --filter @atlas/db exec prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script
