services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_USER: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2026-06-13T11-33-47Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: atlas-password
      MINIO_ROOT_USER: atlas
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["sh", "-c", "corepack pnpm --filter @atlas/db exec prisma migrate deploy --schema prisma/schema.prisma && corepack pnpm --filter @atlas/db seed"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
    volumes:
      - .:/app
      - /app/node_modules

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/api", "dev"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/api", "worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/web", "dev"]
    depends_on:
      api:
        condition: service_started
    env_file: .env.example
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  minio-data:
  postgres-data:
  redis-data:
