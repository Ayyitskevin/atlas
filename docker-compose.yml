services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_USER: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: atlas-password
      MINIO_ROOT_USER: atlas
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 atlas atlas-password && mc mb --ignore-existing local/atlas-local && mc anonymous set none local/atlas-local"]

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["sh", "-c", "corepack pnpm --filter @atlas/db exec prisma migrate deploy --schema prisma/schema.prisma && corepack pnpm --filter @atlas/db seed"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
    volumes:
      - .:/app
      - /app/node_modules

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/api", "dev"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/api", "worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    command: ["corepack", "pnpm", "--filter", "@atlas/web", "dev"]
    depends_on:
      api:
        condition: service_started
    env_file: .env.example
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  minio-data:
  postgres-data:
  redis-data:
